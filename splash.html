<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PayDesk</title>
<link rel="stylesheet" href="./assets/css/tokens.css">
<style>
  body {
    margin: 0;
    background: var(--dark);
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  .splash {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    animation: fadeIn 0.6s ease;
  }

  .splash-logo {
    width: 80px; height: 80px;
    background: var(--accent);
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; font-weight: 700;
    color: #fff;
    letter-spacing: -1px;
    box-shadow: 0 0 60px rgba(72,202,228,0.3);
    animation: pulse 2s ease infinite;
  }

  .splash-name {
    font-size: 28px;
    font-weight: 500;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .splash-sub {
    font-size: 14px;
    color: #555;
  }

  .splash-loader {
    width: 40px; height: 3px;
    background: #222;
    border-radius: 2px;
    overflow: hidden;
    margin-top: 20px;
  }

  .splash-loader-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    animation: load 2s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 40px rgba(72,202,228,0.2); }
    50%       { box-shadow: 0 0 80px rgba(72,202,228,0.5); }
  }

  @keyframes load {
    from { width: 0; }
    to   { width: 100%; }
  }
</style>
</head>
<body>
<div class="splash">
  <div class="splash-logo">PD</div>
  <div class="splash-name">PayDesk</div>
  <div class="splash-sub">Sistema POS con timbrado CFDI</div>
  <div class="splash-loader">
    <div class="splash-loader-bar"></div>
  </div>
</div>
<script>
  // Redirige al onboarding o al login según si ya pasó el onboarding
  setTimeout(() => {
    const yaVioOnboarding = localStorage.getItem('pd_onboarding_done');
    if (yaVioOnboarding) {
      window.location.href = './index.html';
    } else {
      window.location.href = './pages/onboarding/index.html';
    }
  }, 2400);
</script>
</body>
</html>
